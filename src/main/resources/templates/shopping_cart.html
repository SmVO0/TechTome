<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart – TechTome</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/home.css">
</head>
<body>

<header>
    <div class="navbar">
        <a th:href="@{/}"><img src="/images/header/Logo.png" alt="TechTome" class="logo"></a>
        <div class="search-box">
            <input type="text" class="search-bar" placeholder="Search TechTome...">
            <button type="button" class="search-btn">
                <img src="/images/header/search.png" alt="Search" class="search-icon">
            </button>
        </div>
        <div class="icons">
            <a th:href="@{/shopping}" aria-label="Shopping cart">
                <img src="/images/header/shopping_cart.png" alt="Cart" class="nav-icon">
            </a>
            <a th:href="@{/users/profile}" aria-label="Profile">
                <img src="/images/header/Profile.png" alt="Profile" class="nav-icon">
            </a>
        </div>
    </div>
</header>

<div class="main-container">

    <aside class="sidebar">
        <nav class="menu">
            <a th:href="@{/home}">Home</a>
            <a th:href="@{/category/computers}">Computers</a>
            <a th:href="@{/category/laptops}">Laptops</a>
            <a th:href="@{/category/keyboards}">Keyboards</a>
            <a th:href="@{/category/mice}">Mice</a>
            <a th:href="@{/category/monitors}">Monitors</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="cart-layout">

            <!-- Cart items -->
            <section class="cart-items">
                <h2>Shopping Cart</h2>

                <!-- Empty state -->
                <div th:if="${#lists.isEmpty(items)}" class="cart-empty">
                    <p>Your cart is empty.</p>
                    <a th:href="@{/home}" class="btn-continue">Continue Shopping</a>
                </div>

                <!-- Cart table -->
                <div th:unless="${#lists.isEmpty(items)}">
                    <table class="cart-table">
                        <thead>
                            <tr>
                                <th colspan="2">Item</th>
                                <th>Unit Price</th>
                                <th>Quantity</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cartItem : ${items}">
                                <td class="cart-item-img-cell">
                                    <img th:src="${cartItem.storeItem.image}"
                                         th:alt="${cartItem.storeItem.name}"
                                         class="cart-item-img">
                                </td>
                                <td class="cart-item-name" th:text="${cartItem.storeItem.name}"></td>
                                <td th:text="'$' + ${cartItem.storeItem.price}"></td>
                                <td>
                                    <div class="cart-qty-controls">
                                        <form th:action="@{/shopping/remove}" method="post">
                                            <input type="hidden" name="itemId" th:value="${cartItem.storeItem.id}">
                                            <button type="submit" class="cart-qty-btn" aria-label="Decrease quantity">−</button>
                                        </form>
                                        <span class="cart-qty-value" th:text="${cartItem.quantity}"></span>
                                        <form th:action="@{/shopping/add}" method="post">
                                            <input type="hidden" name="itemId" th:value="${cartItem.storeItem.id}">
                                            <button type="submit" class="cart-qty-btn" aria-label="Increase quantity">+</button>
                                        </form>
                                    </div>
                                </td>
                                <td th:text="'$' + ${cartItem.storeItem.price * cartItem.quantity}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Order summary -->
            <aside class="cart-summary" th:unless="${#lists.isEmpty(items)}">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span th:text="'$' + ${totalPrice}"></span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span class="summary-free">FREE</span>
                </div>
                <hr class="summary-divider">
                <div class="summary-row summary-total">
                    <span>Total</span>
                    <span th:text="'$' + ${totalPrice}"></span>
                </div>
                <button type="button" class="btn-checkout">Proceed to Checkout</button>
                <a th:href="@{/home}" class="btn-continue">Continue Shopping</a>
            </aside>

        </div>
    </main>

</div>

<footer th:insert="fragments/footer :: footer"></footer>

</body>
</html>
