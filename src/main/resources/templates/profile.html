<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile – TechTome</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/home.css">
</head>
<body>

<header>
    <div class="navbar">
        <a th:href="@{/}"><img src="/images/header/Logo.png" alt="TechTome" class="logo"></a>
        <div class="search-box">
            <input type="text" class="search-bar" placeholder="Search TechTome...">
            <button type="button" class="search-btn">
                <img src="/images/header/search.png" alt="Search" class="search-icon">
            </button>
        </div>
        <div class="icons">
            <a th:href="@{/shopping}" aria-label="Shopping cart">
                <img src="/images/header/shopping_cart.png" alt="Cart" class="nav-icon">
            </a>
            <a th:href="@{/users/profile}" aria-label="Profile">
                <img src="/images/header/Profile.png" alt="Profile" class="nav-icon">
            </a>
        </div>
    </div>
</header>

<div class="main-container">

    <aside class="sidebar">
        <nav class="menu">
            <a th:href="@{/home}">Home</a>
            <a th:href="@{/category/computers}">Computers</a>
            <a th:href="@{/category/laptops}">Laptops</a>
            <a th:href="@{/category/keyboards}">Keyboards</a>
            <a th:href="@{/category/mice}">Mice</a>
            <a th:href="@{/category/monitors}">Monitors</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="profile">

            <div class="profile-name">
                <h1 th:text="${user.username}">Username</h1>
            </div>

            <div class="profile-image">
                <img th:src="${user.profilePicture}"
                     th:alt="${user.username}"
                     class="profile-avatar">
            </div>

            <div class="profile-info">
                <a th:href="@{/users/profile/info}">Personal info</a>
                <a th:href="@{/users/subscription}">Manage subscription</a>
                <a th:if="${user.role.name() == 'ADMIN'}" th:href="@{/users}">Admin panel</a>
            </div>

        </div>
    </main>

</div>

<footer th:insert="fragments/footer :: footer"></footer>

</body>
</html>
