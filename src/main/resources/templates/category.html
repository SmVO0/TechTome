<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTome</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/category.css">
</head>
<body>

<header>
    <div class="navbar">
        <a th:href="@{/}"><img src="/images/header/Logo.png" alt="TechTome" class="logo"></a>
        <div class="search-box">
            <input type="text" class="search-bar" placeholder="Search TechTome...">
            <button type="button" class="search-btn">
                <img src="/images/header/search.png" alt="Search" class="search-icon">
            </button>
        </div>
        <div class="icons">
            <a th:href="@{/shopping}" aria-label="Shopping cart">
                <img src="/images/header/shopping_cart.png" alt="Cart" class="nav-icon">
            </a>
            <a th:href="@{/users/profile}" aria-label="Profile">
                <img src="/images/header/Profile.png" alt="Profile" class="nav-icon">
            </a>
        </div>
    </div>
</header>

<div class="main-container">

    <aside class="sidebar">
        <nav class="menu">
            <a th:href="@{/home}">Home</a>
            <a th:href="@{/category/computers}">Computers</a>
            <a th:href="@{/category/laptops}">Laptops</a>
            <a th:href="@{/category/keyboards}">Keyboards</a>
            <a th:href="@{/category/mice}">Mice</a>
            <a th:href="@{/category/monitors}">Monitors</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="promotions">
            <a th:href="@{/promotions/new}">What's New</a>
            <a th:href="@{/promotions/bestseller}">Bestseller</a>
            <a th:href="@{/promotions/promotion}">Promotions</a>
        </div>

        <div class="items-container">
            <div class="item" th:each="item : ${items}">
                <a th:href="@{'/item/' + ${item.id}}">
                    <img th:src="${item.image}" alt="Item Image" class="item-image">
                    <p th:text="${item.name}">Item name</p>
                </a>
                <hr>
                <div class="bottom-item">
                    <div class="price-container">
                        <p>Price</p>
                        <p th:text="'$' + ${item.price}"></p>
                    </div>
                    <form th:action="@{/shopping/add}" method="post">
                        <input type="hidden" name="itemId" th:value="${item.id}">
                        <button type="submit">Add to Cart</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

</div>

<footer th:insert="fragments/footer :: footer"></footer>

</body>
</html>
