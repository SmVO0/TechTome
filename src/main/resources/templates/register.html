<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account – TechTome</title>
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>

<header>
    <div class="navbar">
        <a th:href="@{/}"><img src="/images/header/Logo.png" alt="TechTome" class="logo"></a>
    </div>
</header>

<main class="page-content">
    <div class="register-container">
        <h1>Create Account</h1>

        <form class="form" th:action="@{/register}" method="post" th:object="${registerRequest}">

            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Username" th:field="*{username}" required>
            <p class="alert-warning" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Email" th:field="*{email}" required>
            <p class="alert-warning" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password" th:field="*{password}" required>
            <p class="alert-warning" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

            <button type="submit" class="login-btn">Create Account</button>
        </form>
        <p>Already have an account? <a th:href="@{/login}">Sign in</a></p>
    </div>
</main>

<footer th:insert="fragments/footer :: footer"></footer>

</body>
</html>
